name: flaskhello CI/CD

on:
    push:
        paths:
            - 'flaskhello/**'
            - '.github/workflows/ci-flaskhello.yml'
    pull_request:
        branches:
            - main
        paths:
            - 'flaskhello/**'
            - '.github/workflows/ci-flaskhello.yml'

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.12'

            - name: Install dependencies
              run: pip install -r flaskhello/requirements.txt

            - name: Run tests
              run: pytest flaskhello/tests/

    deploy:
        needs: test
        # Only deploy on merge to main, not on PRs or feature branches
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        runs-on: ubuntu-latest

        # Required for OIDC
        permissions:
            id-token: write
            contents: read
        
        steps:
            - uses: actions/checkout@v4

            - name: Configure AWS credentials via OIDC
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                aws-region: us-east-1

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2
            
            - name: Build, tag, and push image to ECR
              env:
                ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                ECR_REPOSITORY: flaskhello
                IMAGE_TAG: ${{ github.sha }}
              run: |
                docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG flaskhello/
                docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
                docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
            
            - name: Update task definition with new image
              id: update-task-def
              uses: aws-actions/amazon-ecs-render-task-definition@v1
              with:
                task-definition: task-definition.json
                container-name: flaskhello
                image: ${{ steps.login-ecr.outputs.registry }}/flaskhello:${{ github.sha }}

            - name: Deploy updated task definition to ECS
              uses: aws-actions/amazon-ecs-deploy-task-definition@v2
              with:
                task-definition: ${{ steps.update-task-def.outputs.task-definition }}
                service: flaskhello-service
                cluster: flaskhello-cluster
                wait-for-service-stability: true
